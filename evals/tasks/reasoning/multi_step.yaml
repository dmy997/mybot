id: multi_step_explain
description: "Explain how a multi-file feature works by tracing through code"
prompt: "Explain how the memory consolidation pipeline works in this project. What are the two stages (Consolidator and Dream), where are they defined, and how do they interact?"
expected_tools: [grep, Read]
expected_in_answer:
  - Consolidator
  - Dream
  - history.jsonl
  - SOUL
  - MEMORY
max_steps: 12
timeout_seconds: 180
