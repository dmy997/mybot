<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mybot Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --sidebar: #0f1629;
  --border: #2a2a4a;
  --text: #e0e0e0;
  --text-muted: #888;
  --accent: #6c63ff;
  --accent-hover: #7f79ff;
  --danger: #e53e3e;
  --bubble-user: #1e3a5f;
  --bubble-assistant: #16213e;
  --bubble-tool: #1a3a2e;
  --bubble-think: #2a2a38;
  --ok: #6ecca0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; display: flex;
}
button { cursor: pointer; font-family: inherit; }
input { font-family: inherit; }

/* Sidebar */
#sidebar {
  width: 260px; min-width: 260px; background: var(--sidebar);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
}
#sidebar-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  font-size: 18px; font-weight: 700; color: var(--accent);
  display: flex; align-items: center; gap: 8px;
}
#session-list { flex: 1; overflow-y: auto; padding: 8px; }
.session-item {
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 4px; font-size: 13px; transition: background .15s;
}
.session-item:hover { background: rgba(255,255,255,.05); }
.session-item.active { background: var(--accent); color: #fff; }
.session-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.session-item .count { font-size: 11px; opacity: .7; margin-left: 8px; }
.session-item .del-btn {
  background: none; border: none; color: var(--text-muted); font-size: 14px;
  padding: 0 4px; visibility: hidden; line-height: 1;
}
.session-item:hover .del-btn { visibility: visible; }
.session-item .del-btn:hover { color: var(--danger); }

/* Sidebar nav */
#sidebar-nav {
  border-top: 1px solid var(--border); padding: 8px;
  display: flex; flex-direction: column; gap: 4px;
}
#sidebar-nav button {
  padding: 8px 12px; background: transparent; color: var(--text-muted);
  border: 1px solid transparent; border-radius: 8px; font-size: 12px;
  text-align: left; transition: all .15s;
}
#sidebar-nav button:hover { background: rgba(255,255,255,.05); color: var(--text); }
#sidebar-nav button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

#new-session-btn {
  margin: 8px; padding: 10px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
}
#new-session-btn:hover { background: var(--accent-hover); }

/* Main */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

/* Chat view — always rendered, never display:none (preserves streaming DOM) */
#chat-view { flex: 1; display: flex; flex-direction: column; min-height: 0; }
#chat-header {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  font-size: 14px; color: var(--text-muted);
}
#chat-header strong { color: var(--text); }
#messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }

.message { max-width: 85%; padding: 8px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; overflow-wrap: break-word; display: flex; flex-direction: column; }
.message.user { align-self: flex-end; background: var(--bubble-user); border-bottom-right-radius: 4px; }
.message.assistant { align-self: flex-start; background: var(--bubble-assistant); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
.message.user .msg-time { align-self: flex-end; }
.message.assistant .msg-time { align-self: flex-start; }
.message.assistant p { margin: 4px 0; }
.message.assistant pre {
  background: #0d1117; border-radius: 6px; padding: 12px; overflow-x: auto;
  font-size: 12px; line-height: 1.4; margin: 8px 0;
}
.message.assistant code { font-size: 12px; background: rgba(255,255,255,.08); padding: 2px 4px; border-radius: 3px; }
.message.assistant pre code { background: none; padding: 0; }
.message.error { align-self: center; background: rgba(229,62,62,.15); color: #f87171; font-size: 13px; }

.think-block {
  background: var(--bubble-think); border: 1px solid var(--border);
  border-radius: 8px; margin: 4px 0; overflow: hidden;
}
.think-summary {
  padding: 6px 12px; font-size: 12px; color: var(--text-muted);
  cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none;
}
.think-summary:hover { background: rgba(255,255,255,.03); }
.think-summary .arrow { transition: transform .2s; font-size: 10px; }
.think-body { padding: 8px 12px; font-size: 12px; color: #a0a0b0; white-space: pre-wrap; display: none; }
.think-block.open .think-body { display: block; }
.think-block.open .arrow { transform: rotate(90deg); }

.tool-block {
  background: var(--bubble-tool); border: 1px solid var(--border);
  border-radius: 8px; margin: 4px 0; overflow: hidden;
}
.tool-summary {
  padding: 6px 12px; font-size: 12px; color: var(--ok);
  cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none;
}
.tool-summary:hover { background: rgba(255,255,255,.03); }
.tool-body { padding: 8px 12px; font-size: 12px; color: #a0b0b0; white-space: pre-wrap; display: none; max-height: 200px; overflow-y: auto; }
.tool-block.open .tool-body { display: block; }

.usage-badge { align-self: flex-end; font-size: 11px; color: var(--text-muted); padding: 2px 8px; }

#input-area {
  padding: 12px 20px; border-top: 1px solid var(--border);
}
#paradigm-cards {
  display: flex; gap: 8px; padding: 0 20px 8px; flex-wrap: wrap; align-items: center;
}
.paradigm-card {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border); background: var(--surface); color: var(--text-muted);
  cursor: pointer; transition: all .15s; user-select: none;
  display: flex; align-items: center; gap: 5px;
}
.paradigm-card:hover { border-color: var(--accent); color: var(--text); }
.paradigm-card.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.paradigm-card.active::before { content: '✓'; font-size: 10px; }
.paradigm-card.reflect-card { border-style: dashed; }
.paradigm-card.reflect-card.active { border-style: solid; background: #7c3aed; border-color: #7c3aed; }
.paradigm-hint {
  font-size: 11px; color: var(--text-muted); margin-left: auto; white-space: nowrap;
}
#input-row {
  display: flex; gap: 10px;
}
#input-row input {
  flex: 1; padding: 12px 16px; background: var(--surface); color: var(--text);
  border: 1px solid var(--border); border-radius: 12px; font-size: 14px; outline: none;
}
#input-row input:focus { border-color: var(--accent); }
#input-row input::placeholder { color: var(--text-muted); }
#send-btn {
  padding: 12px 20px; background: var(--accent); color: #fff;
  border: none; border-radius: 12px; font-size: 14px; font-weight: 600;
}
#send-btn:hover:not(:disabled) { background: var(--accent-hover); }
#send-btn:disabled { opacity: .5; cursor: not-allowed; }

#image-previews {
  display: flex; gap: 8px; padding: 0 20px 8px; flex-wrap: wrap;
}
#image-previews:empty { display: none; }
.image-preview-item {
  position: relative; width: 64px; height: 64px; border-radius: 8px;
  overflow: hidden; border: 2px solid var(--border);
}
.image-preview-item img {
  width: 100%; height: 100%; object-fit: cover;
}
.image-preview-item .remove-btn {
  position: absolute; top: 0; right: 0;
  background: rgba(0,0,0,.7); color: #fff; border: none;
  font-size: 14px; width: 20px; height: 20px; line-height: 20px;
  cursor: pointer; border-radius: 0 0 0 6px; padding: 0;
}
#input-area.drop-active { outline: 2px dashed var(--accent); border-radius: 12px; }

/* Observability view — absolute overlay on top of chat, never toggles display */
#observability-view {
  position: absolute; inset: 0; z-index: 10; background: var(--bg);
  display: none; flex-direction: column; min-height: 0;
}
#observability-view.active { display: flex; }
#obs-header {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
#obs-header h2 { font-size: 16px; font-weight: 600; }
#obs-header button {
  padding: 6px 14px; background: var(--surface); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px; font-size: 12px;
}
#obs-header button:hover { background: var(--accent); color: #fff; }
#obs-content { flex: 1; overflow-y: auto; padding: 16px 20px; }

/* Metrics cards */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.metric-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
}
.metric-card h3 { font-size: 13px; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .5px; }
.metric-card table { width: 100%; border-collapse: collapse; font-size: 13px; }
.metric-card td { padding: 4px 0; }
.metric-card td:first-child { color: var(--text-muted); }
.metric-card td:last-child { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
.metric-card .err { color: var(--danger); }

/* Log entries */
.log-entry {
  padding: 8px 12px; margin-bottom: 4px; border-radius: 6px;
  background: var(--surface); border: 1px solid var(--border);
  font-size: 12px; line-height: 1.5;
  border-left-width: 3px;
}
.log-entry.log-WARNING { border-left-color: #f0a040; background: rgba(240,160,64,.06); }
.log-entry.log-ERROR { border-left-color: var(--danger); background: rgba(229,62,62,.08); }
.log-entry.log-CRITICAL { border-left-color: #991b1b; background: rgba(153,27,27,.12); }
.log-entry .ts { color: var(--text-muted); margin-right: 8px; }
.log-entry .type { color: var(--accent); font-weight: 600; margin-right: 8px; }
.log-entry .level-badge {
  display: inline-block; padding: 1px 6px; border-radius: 3px;
  font-size: 10px; font-weight: 700; margin-right: 6px; text-transform: uppercase;
}
.log-entry .level-WARNING { background: rgba(240,160,64,.25); color: #f0a040; }
.log-entry .level-ERROR { background: rgba(229,62,62,.25); color: #f87171; }
.log-entry .level-CRITICAL { background: rgba(153,27,27,.35); color: #fca5a5; }
.log-entry .log-message { color: #fbbf24; font-weight: 500; }
.log-entry.log-ERROR .log-message { color: #f87171; }
.log-entry.log-CRITICAL .log-message { color: #fca5a5; }
.log-entry .log-loc { color: var(--text-muted); font-size: 11px; margin-left: 6px; }
.log-entry .log-exception {
  display: block; margin-top: 4px; padding: 6px 8px;
  background: rgba(0,0,0,.3); border-radius: 4px;
  font-family: monospace; font-size: 11px; color: #f87171;
  white-space: pre-wrap; word-break: break-all;
}
.log-entry .data { color: var(--text); word-break: break-all; }

/* Trace cards (Jaeger-style waterfall) */
.trace-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 16px; overflow: hidden;
}
.trace-card-header {
  padding: 10px 16px; background: rgba(255,255,255,.03);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 20px; font-size: 12px; color: var(--text-muted); align-items: center;
}
.trace-card-header .trace-id { color: var(--accent); font-weight: 600; font-size: 13px; }
.trace-spans { padding: 8px 0; }

/* Span row */
.span-row { border-bottom: 1px solid rgba(255,255,255,.025); }
.span-row:last-child { border-bottom: none; }
.span-row-header {
  display: flex; align-items: center; gap: 8px; padding: 5px 12px;
  min-height: 32px;
}
.span-row-header.clickable { cursor: pointer; }
.span-row-header.clickable:hover { background: rgba(255,255,255,.03); }
.span-expand-icon {
  font-size: 9px; color: var(--text-muted); width: 14px; flex-shrink: 0;
  text-align: center; transition: transform .15s; line-height: 1;
}
.span-row.expanded > .span-row-header .span-expand-icon { transform: rotate(90deg); }

/* Duration bar track */
.span-bar-track {
  flex: 1; height: 22px; background: rgba(255,255,255,.04);
  border-radius: 4px; position: relative; overflow: hidden; min-width: 80px;
}
.span-bar {
  position: absolute; top: 0; height: 100%; border-radius: 4px;
  opacity: .7; min-width: 2px;
}
.span-row-header.clickable:hover .span-bar { opacity: .9; }
.span-bar-llm     { background: var(--accent); }
.span-bar-tool    { background: var(--ok); }
.span-bar-orch    { background: #f0a040; }
.span-bar-agent   { background: #a78bfa; }
.span-bar-default { background: #6b7280; }

.span-bar-label {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: space-between; padding: 0 8px;
  font-size: 11px; color: var(--text); pointer-events: none;
}
.span-bar-label .span-dur { color: var(--text-muted); font-size: 10px; margin-left: 16px; }
.span-status-err {
  color: var(--danger); font-weight: 700; font-size: 12px;
  width: 16px; text-align: center; flex-shrink: 0; title: "error";
}

/* Span expandable details */
.span-details { display: none; padding: 0 12px 8px 46px; }
.span-row.expanded > .span-details { display: block; }
.span-detail-section {
  margin-top: 6px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
}
.span-detail-label {
  padding: 5px 10px; font-size: 11px; font-weight: 600;
  color: var(--accent); background: rgba(255,255,255,.03);
  border-bottom: 1px solid var(--border);
}
.span-detail-section table {
  width: 100%; border-collapse: collapse; font-size: 11px;
}
.span-detail-section td {
  padding: 3px 10px; vertical-align: top;
}
.span-detail-section td:first-child {
  color: var(--text-muted); width: 120px; white-space: nowrap;
}
.span-detail-section td:last-child {
  color: var(--text); word-break: break-all; font-family: monospace; font-size: 10px;
}
.span-detail-section pre {
  margin: 0; padding: 10px; font-size: 10px; line-height: 1.45;
  color: var(--text); background: rgba(0,0,0,.25);
  overflow-x: auto; max-height: 260px; overflow-y: auto;
  white-space: pre-wrap; word-break: break-all;
}

/* Loading dots */
.loading-dots { display: inline-flex; gap: 3px; padding: 4px 0; }
.loading-dots span {
  width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%;
  animation: dot-bounce 1.4s infinite ease-in-out both;
}
.loading-dots span:nth-child(1) { animation-delay: -.32s; }
.loading-dots span:nth-child(2) { animation-delay: -.16s; }
@keyframes dot-bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* HITL modal */
#hitl-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  display: none; justify-content: center; align-items: center; z-index: 1000;
}
#hitl-overlay.active { display: flex; }
#hitl-dialog {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 24px; max-width: 480px; width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
#hitl-dialog h3 { font-size: 16px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
#hitl-dialog .hitl-warn { color: #f0a040; font-size: 13px; margin-bottom: 16px; }
#hitl-dialog .hitl-field { margin-bottom: 12px; }
#hitl-dialog .hitl-field .hitl-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
#hitl-dialog .hitl-field pre {
  background: #0d1117; border-radius: 6px; padding: 10px 12px; font-size: 12px;
  overflow-x: auto; max-height: 160px; overflow-y: auto; white-space: pre-wrap;
  word-break: break-all; line-height: 1.4; margin: 0;
}
#hitl-dialog .hitl-caps { display: flex; gap: 6px; flex-wrap: wrap; }
#hitl-dialog .hitl-cap {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: rgba(108,99,255,.15); color: var(--accent);
}
#hitl-dialog .hitl-buttons { display: flex; gap: 10px; margin-top: 20px; }
#hitl-dialog .hitl-buttons button {
  flex: 1; padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none;
}
#hitl-btn-approve { background: var(--ok); color: #111; }
#hitl-btn-approve:hover { opacity: .85; }
#hitl-btn-deny { background: var(--danger); color: #fff; }
#hitl-btn-deny:hover { opacity: .85; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">mybot Chat</div>
  <div id="session-list"></div>
  <div id="sidebar-nav">
    <button data-view="metrics" onclick="switchView('metrics')">Metrics</button>
    <button data-view="logs" onclick="switchView('logs')">Log</button>
    <button data-view="trace" onclick="switchView('trace')">Trace</button>
  </div>
  <button id="new-session-btn" onclick="newSession()">+ New Session</button>
</div>

<div id="main">
  <div id="chat-view">
    <div id="chat-header">
      Session: <strong id="current-session-name">default</strong>
      <span id="goal-badge" style="display:none;margin-left:8px;padding:2px 8px;background:#3b82f6;color:#fff;border-radius:10px;font-size:12px;cursor:pointer" title="Click to clear goal" onclick="setGoal(null)"></span>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <div id="paradigm-cards">
        <span style="font-size:11px;color:var(--text-muted);margin-right:4px;">Agent:</span>
        <div class="paradigm-card" data-paradigm="plan_solve" onclick="toggleParadigm(this)">Plan</div>
        <div class="paradigm-card" data-paradigm="deep_research" onclick="toggleParadigm(this)">Deep Research</div>
        <div class="paradigm-card reflect-card" data-paradigm="reflect" onclick="toggleReflect(this)">Reflect</div>
        <span class="paradigm-hint" id="paradigm-hint"></span>
      </div>
      <div id="image-previews"></div>
      <div id="input-row">
        <input id="message-input" type="text" placeholder="Type a message... (paste/drop images)" autofocus
               onkeydown="handleInputKey(event)">
        <button id="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <div id="observability-view">
    <div id="obs-header">
      <h2 id="obs-title">Metrics</h2>
      <button onclick="switchView('chat')">Back to Chat</button>
    </div>
    <div id="obs-content"></div>
  </div>
</div>

<!-- HITL confirmation modal -->
<div id="hitl-overlay">
  <div id="hitl-dialog">
    <h3>HITL Confirmation</h3>
    <div class="hitl-warn">This tool requires your approval to execute.</div>
    <div class="hitl-field">
      <div class="hitl-label">Tool</div>
      <pre id="hitl-tool-name"></pre>
    </div>
    <div class="hitl-field">
      <div class="hitl-label">Arguments</div>
      <pre id="hitl-tool-args"></pre>
    </div>
    <div class="hitl-field">
      <div class="hitl-label">Capabilities</div>
      <div id="hitl-tool-caps" class="hitl-caps"></div>
    </div>
    <div class="hitl-buttons">
      <button id="hitl-btn-approve" onclick="respondHitl('approved')">Approve</button>
      <button id="hitl-btn-deny" onclick="respondHitl('denied')">Deny</button>
    </div>
  </div>
</div>

<script>
let currentSession = 'default';
let isStreaming = false;
let activeObsView = null;
let obsRefreshTimer = null;
let expandedSpanIds = new Set();
let messageHistory = [];
let historyIndex = -1;
let historyDraft = '';
let currentGoal = null;
let activeParadigm = null;
let reflectEnabled = false;
let _pendingHitlRequestId = null;
let attachedImages = [];  // base64 data URLs

const _HISTORY_MAX = 200;

function _historyKey(sessionKey) {
  return 'mybot_history_' + sessionKey;
}

function _loadMessageHistory(sessionKey) {
  try {
    const raw = localStorage.getItem(_historyKey(sessionKey));
    messageHistory = raw ? JSON.parse(raw) : [];
  } catch {
    messageHistory = [];
  }
  historyIndex = messageHistory.length;
  historyDraft = '';
}

// =========================================================================
// Push events (scheduled task delivery via EventSource)
// =========================================================================
let _pushSource = null;

function _connectPushEvents(sessionKey) {
  if (_pushSource) { _pushSource.close(); _pushSource = null; }

  const url = '/events/' + encodeURIComponent(sessionKey);
  _pushSource = new EventSource(url);

  let asstEl = null, contentEl = null;
  let thinkingBlock = null, thinkingBody = null;
  let toolBlock = null, toolBody = null;
  let textBuffer = '';

  function _ensureBubble() {
    if (asstEl) return;
    asstEl = addBubble('assistant', '');
    contentEl = asstEl.querySelector('.msg-content');
  }

  _pushSource.addEventListener('delta', function(e) {
    let data = JSON.parse(e.data);
    _ensureBubble();
    textBuffer += data.token || '';
    contentEl.innerHTML = marked.parse(textBuffer);
    scrollDown();
    if (thinkingBlock) { thinkingBlock.classList.remove('open'); thinkingBlock = null; }
  });

  _pushSource.addEventListener('thinking', function(e) {
    let data = JSON.parse(e.data);
    _ensureBubble();
    if (!thinkingBlock) {
      thinkingBlock = createThinkBlock(asstEl);
      thinkingBody = thinkingBlock.querySelector('.think-body');
    }
    thinkingBlock.classList.add('open');
    thinkingBody.textContent += data.token || '';
    scrollDown();
  });

  _pushSource.addEventListener('thinking_done', function() {
    if (thinkingBlock) {
      setTimeout(function() { thinkingBlock && thinkingBlock.classList.remove('open'); }, 2000);
    }
  });

  _pushSource.addEventListener('tool_start', function(e) {
    let data = JSON.parse(e.data);
    _ensureBubble();
    if (!toolBlock || toolBlock.dataset.name !== data.name) {
      toolBlock = createToolBlock(asstEl, data.name);
      toolBody = toolBlock.querySelector('.tool-body');
    }
  });

  _pushSource.addEventListener('tool_end', function(e) {
    let data = JSON.parse(e.data);
    if (toolBlock) {
      toolBody.textContent += (data.detail || JSON.stringify(data)) + '\n';
      if (data.status === 'error') {
        toolBlock.querySelector('.tool-summary').style.color = '#f87171';
      }
    }
  });

  _pushSource.addEventListener('done', function(e) {
    let data = JSON.parse(e.data);
    _ensureBubble();
    if (!textBuffer && data.content) {
      contentEl.innerHTML = marked.parse(data.content);
    }
    if (data.usage && (data.usage.prompt_tokens || data.usage.completion_tokens)) {
      let badge = document.createElement('div');
      badge.className = 'usage-badge';
      badge.textContent = 'in:' + (data.usage.prompt_tokens || '?')
        + ' out:' + (data.usage.completion_tokens || '?');
      asstEl.appendChild(badge);
    }
    asstEl = null; contentEl = null; thinkingBlock = null; toolBlock = null; textBuffer = '';
  });

  _pushSource.addEventListener('push_error', function(e) {
    console.warn('Push error:', e.data);
  });

  _pushSource.addEventListener('error', function(e) {
    let data = JSON.parse(e.data);
    _ensureBubble();
    if (!textBuffer && data.message) {
      contentEl.innerHTML = marked.parse('Error: ' + esc(data.message));
    }
    asstEl = null; contentEl = null; thinkingBlock = null; toolBlock = null; textBuffer = '';
  });

  _pushSource.addEventListener('hitl_confirm', function(e) {
    _onHitlConfirm(JSON.parse(e.data));
  });

  _pushSource.onerror = function() {
    if (asstEl && !textBuffer) { asstEl.remove(); }
    asstEl = null; contentEl = null; thinkingBlock = null; toolBlock = null; textBuffer = '';
  };
}

function _disconnectPushEvents() {
  if (_pushSource) { _pushSource.close(); _pushSource = null; }
}

function _saveMessageHistory(sessionKey) {
  if (messageHistory.length > _HISTORY_MAX) {
    messageHistory = messageHistory.slice(-_HISTORY_MAX);
  }
  try {
    localStorage.setItem(_historyKey(sessionKey), JSON.stringify(messageHistory));
  } catch { /* storage full — ignore */ }
}

// HITL confirmation
// =========================================================================
function _onHitlConfirm(data) {
  _pendingHitlRequestId = data.request_id;
  document.getElementById('hitl-tool-name').textContent = data.tool_name || 'unknown';
  document.getElementById('hitl-tool-args').textContent = JSON.stringify(data.arguments || {}, null, 2);
  const capsEl = document.getElementById('hitl-tool-caps');
  capsEl.innerHTML = (data.capabilities || []).map(function(c) {
    return '<span class="hitl-cap">' + esc(c) + '</span>';
  }).join('') || '<span class="hitl-cap">none</span>';
  document.getElementById('hitl-overlay').classList.add('active');
  document.getElementById('hitl-btn-approve').focus();
}

async function respondHitl(decision) {
  if (!_pendingHitlRequestId) return;
  const rid = _pendingHitlRequestId;
  _pendingHitlRequestId = null;
  document.getElementById('hitl-overlay').classList.remove('active');
  try {
    await fetch('/hitl/respond', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ request_id: rid, decision: decision }),
    });
  } catch (e) {
    console.warn('HITL respond failed:', e);
  }
}

document.addEventListener('keydown', function(e) {
  if (!_pendingHitlRequestId) return;
  if (e.key === 'Escape') { e.preventDefault(); respondHitl('denied'); }
  else if (e.key === 'Enter') { e.preventDefault(); respondHitl('approved'); }
});

// =========================================================================
// Session management
// =========================================================================
async function loadSessions() {
  const resp = await fetch('/sessions');
  const sessions = await resp.json();
  const list = document.getElementById('session-list');
  list.innerHTML = '';

  // Sort by updated_at descending
  sessions.sort((a, b) => {
    const da = a.updated_at ? new Date(a.updated_at) : new Date(0);
    const db = b.updated_at ? new Date(b.updated_at) : new Date(0);
    return db - da;
  });

  // Group by date
  const groups = {};
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);

  sessions.forEach(s => {
    const label = s.updated_at ? dateGroupLabel(new Date(s.updated_at), today, yesterday) : 'Unknown';
    if (!groups[label]) groups[label] = [];
    groups[label].push(s);
  });

  const groupOrder = ['Today', 'Yesterday'];
  Object.keys(groups).sort((a, b) => {
    const ai = groupOrder.indexOf(a), bi = groupOrder.indexOf(b);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return 1;
    return b.localeCompare(a);
  }).forEach(label => {
    const header = document.createElement('div');
    header.style.cssText = 'padding:10px 12px 4px;font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;';
    header.textContent = label;
    list.appendChild(header);

    groups[label].forEach(s => {
      const div = document.createElement('div');
      div.className = 'session-item' + (s.key === currentSession ? ' active' : '');
      div.onclick = (e) => { if (!e.target.closest('.del-btn')) selectSession(s.key); };
      div.innerHTML = `
        <span class="name">${esc(s.key)}</span>
        <span class="count">${s.message_count || 0}</span>
        <button class="del-btn" title="Delete">x</button>`;
      div.querySelector('.del-btn').onclick = async (e) => {
        e.stopPropagation();
        if (confirm('Delete session "' + s.key + '"?')) {
          await fetch('/sessions/' + s.key, { method: 'DELETE' });
          if (currentSession === s.key) selectSession('default');
          loadSessions();
        }
      };
      list.appendChild(div);
    });
  });
  return sessions;
}

function dateGroupLabel(date, today, yesterday) {
  if (date.toDateString() === today.toDateString()) return 'Today';
  if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
  const diffDays = Math.round((today - date) / 86400000);
  if (diffDays < 7) return date.toLocaleDateString('en-US', { weekday: 'long' });
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function selectSession(key) {
  currentSession = key;
  document.getElementById('current-session-name').textContent = key;
  _loadMessageHistory(key);
  _connectPushEvents(key);
  switchView('chat');
  loadSessions();
  loadHistory(key);
}

function newSession() {
  const name = prompt('Session name:');
  if (name && name.trim()) selectSession(name.trim());
}

async function loadHistory(sessionKey) {
  const container = document.getElementById('messages');
  container.innerHTML = '<div style="color:var(--text-muted);padding:20px;text-align:center;">Loading...</div>';

  try {
    const resp = await fetch('/sessions/' + encodeURIComponent(sessionKey) + '/messages');
    if (!resp.ok) throw new Error(resp.statusText);

    const messages = await resp.json();
    container.innerHTML = '';

    if (!messages.length) {
      container.innerHTML = '<div style="color:var(--text-muted);padding:20px;text-align:center;font-size:13px;">No messages yet. Start a conversation!</div>';
      return;
    }

    // Build tool_call_id -> result map from tool messages
    const toolResults = {};
    messages.forEach(m => {
      if (m.role === 'tool' && m.tool_call_id) {
        toolResults[m.tool_call_id] = m.content || '';
      }
    });

    messages.forEach(m => {
      if (m.role === 'user') {
        const div = addBubble('user', '', m.timestamp);
        div.querySelector('.msg-content').innerHTML = marked.parse(m.content || '');
      } else if (m.role === 'assistant') {
        const asstEl = addBubble('assistant', '', m.timestamp);
        const contentEl = asstEl.querySelector('.msg-content');
        if (m.content) contentEl.innerHTML = marked.parse(m.content);

        // Render tool calls
        if (m.tool_calls) {
          m.tool_calls.forEach(tc => {
            const fn = tc.function || {};
            const name = fn.name || tc.name || 'unknown';
            const args = fn.arguments || '';
            const block = document.createElement('div');
            block.className = 'tool-block';
            block.innerHTML =
              '<div class="tool-summary" onclick="this.parentElement.classList.toggle(\'open\')">'
              + '<span class="arrow">&#9654;</span> Tool: ' + esc(name) + '</div>'
              + '<div class="tool-body">' + esc(String(args).substring(0, 2000)) + '</div>';
            // Attach result if available
            if (toolResults[tc.id]) {
              const resDiv = document.createElement('div');
              resDiv.style.cssText = 'padding:4px 12px 8px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);';
              resDiv.textContent = 'Result: ' + toolResults[tc.id].substring(0, 500);
              block.appendChild(resDiv);
            }
            asstEl.appendChild(block);
          });
        }
      }
      // system and tool messages are handled above
    });

    scrollDown();
  } catch (err) {
    container.innerHTML = '<div class="message error">Failed to load history: ' + esc(err.message) + '</div>';
  }
}

// View switching
// =========================================================================
function switchView(view) {
  const obsView = document.getElementById('observability-view');
  const navBtns = document.querySelectorAll('#sidebar-nav button');

  if (obsRefreshTimer) { clearInterval(obsRefreshTimer); obsRefreshTimer = null; }

  if (view === 'chat') {
    activeObsView = null;
    obsView.classList.remove('active');
    navBtns.forEach(b => b.classList.remove('active'));
  } else {
    activeObsView = view;
    obsView.classList.add('active');
    document.getElementById('obs-title').textContent =
      (view === 'metrics' ? 'Metrics' : view === 'logs' ? 'Log' : 'Trace')
      + (currentSession !== 'default' ? ' [' + currentSession + ']' : '');
    navBtns.forEach(b => b.classList.toggle('active', b.dataset.view === view));
    refreshObsView();
    obsRefreshTimer = setInterval(refreshObsView, 5000);
  }
}

async function refreshObsView() {
  if (!activeObsView) return;
  switch (activeObsView) {
    case 'metrics': await showMetrics(); break;
    case 'logs': await showLogs(); break;
    case 'trace': await showTraces(); break;
  }
}

async function showLogs() {
  const el = document.getElementById('obs-content');
  try {
    let url = '/logs?limit=200';
    if (currentSession !== 'default') url += '&session_key=' + encodeURIComponent(currentSession);
    const resp = await fetch(url);
    let logs = await resp.json();

    if (!logs.length) {
      el.innerHTML = '<div style="color:var(--text-muted);padding:20px;">'
        + (currentSession !== 'default'
          ? 'No logs for this session yet. Send a message to generate events.'
          : 'No log events yet. Send a message to generate events.')
        + '</div>';
      return;
    }

    const now = Date.now() / 1000;
    el.innerHTML = logs.reverse().map(e => {
      const ago = Math.round(now - e.timestamp);
      const ts = ago < 60 ? `${ago}s ago` : ago < 3600 ? `${Math.round(ago/60)}m ago` : `${Math.round(ago/3600)}h ago`;
      const data = e.data || {};
      const level = data.level || '';
      const isPlainLog = !!level;

      let entryClass = 'log-entry';
      if (level) entryClass += ' log-' + level;

      let levelBadge = '';
      if (level) {
        levelBadge = `<span class="level-badge level-${level}">${esc(level)}</span>`;
      }

      let mainContent = '';
      if (isPlainLog) {
        const msg = data.message || '';
        const mod = data.module || '';
        const fn = data.function || '';
        const line = data.line || 0;
        const loc = (mod || fn) ? `<span class="log-loc">${esc(mod)}${mod && fn ? '.' : ''}${esc(fn)}${line ? ':' + line : ''}</span>` : '';
        mainContent = `<span class="log-message">${esc(msg.substring(0, 300))}</span>${loc}`;
        if (data.exception) {
          mainContent += `<span class="log-exception">${esc(String(data.exception).substring(0, 1000))}</span>`;
        }
        if (data.extra && Object.keys(data.extra).length) {
          const extraStr = Object.entries(data.extra).map(([k,v]) => {
            const sv = typeof v === 'number' ? (v > 1000 ? fmtNum(v) : v) : String(v).substring(0, 80);
            return `<span style="color:var(--text-muted)">${esc(k)}</span>=<span style="color:var(--text)">${esc(String(sv))}</span>`;
          }).join(' ');
          if (extraStr) mainContent += `<div style="margin-top:4px">${extraStr}</div>`;
        }
      } else {
        const dataStr = Object.entries(data).map(([k,v]) => {
          const sv = typeof v === 'number' ? (v > 1000 ? fmtNum(v) : v) : String(v).substring(0, 80);
          return `<span style="color:var(--text-muted)">${esc(k)}</span>=<span style="color:var(--text)">${esc(String(sv))}</span>`;
        }).join(' ');
        mainContent = `<span class="data">${dataStr}</span>`;
      }

      return `<div class="${entryClass}">
        <span class="ts">${ts}</span>
        ${levelBadge}
        <span class="type">${esc(e.event_type)}</span>
        ${mainContent}
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = '<div class="error-msg">Failed to load logs</div>';
  }
}

// =========================================================================
// Trace
// =========================================================================
async function showTraces() {
  const el = document.getElementById('obs-content');
  try {
    // Save expanded span IDs before re-render
    el.querySelectorAll('.span-row.expanded').forEach(r => {
      expandedSpanIds.add(r.dataset.spanId);
    });

    let turl = '/traces?limit=100';
    if (currentSession !== 'default') turl += '&session_key=' + encodeURIComponent(currentSession);
    const resp = await fetch(turl);
    let spans = await resp.json();

    if (!spans.length) {
      expandedSpanIds.clear();
      el.innerHTML = '<div style="color:var(--text-muted);padding:20px;">'
        + (currentSession !== 'default'
          ? 'No traces for this session yet. Send a message to generate traces.'
          : 'No trace spans yet. Send a message to generate traces.')
        + '</div>';
      return;
    }

    const traces = {};
    spans.forEach(s => {
      if (!traces[s.trace_id]) traces[s.trace_id] = [];
      traces[s.trace_id].push(s);
    });

    const traceIds = Object.keys(traces).sort((a, b) => {
      const ma = Math.max(...traces[a].map(s => s.end_time || 0));
      const mb = Math.max(...traces[b].map(s => s.end_time || 0));
      return mb - ma;
    });

    el.innerHTML = traceIds.slice(0, 20).map(tid => renderTraceCard(tid, traces[tid])).join('');

    // Restore expanded state
    expandedSpanIds.forEach(id => {
      const row = el.querySelector(`.span-row[data-span-id="${id}"]`);
      if (row) row.classList.add('expanded');
    });
  } catch (e) {
    el.innerHTML = '<div class="error-msg">Failed to load traces</div>';
  }
}

function renderTraceCard(tid, spans) {
  const roots = spans.filter(s => !s.parent_span_id);
  const children = {};
  spans.forEach(s => {
    if (s.parent_span_id) {
      if (!children[s.parent_span_id]) children[s.parent_span_id] = [];
      children[s.parent_span_id].push(s);
    }
  });

  const startTimes = spans.map(s => s.start_time).filter(Boolean);
  const endTimes = spans.map(s => s.end_time).filter(Boolean);
  if (!startTimes.length || !endTimes.length) return '';
  const traceStart = Math.min(...startTimes);
  const traceEnd = Math.max(...endTimes);
  const traceDur = Math.max(traceEnd - traceStart, 0.001);
  const totalDur = (traceEnd - traceStart) * 1000;
  const errors = spans.filter(s => s.status === 'error').length;

  const renderSpan = (s, depth) => {
    const offsetPct = ((s.start_time - traceStart) / traceDur * 100).toFixed(2);
    const widthPct = Math.max((s.latency_ms || 0) / 1000 / traceDur * 100, 0.6).toFixed(2);
    const dur = s.latency_ms != null ? fmtMs(s.latency_ms) : '?';
    const type = getSpanType(s.name);
    const hasDetails = (s.attributes && Object.keys(s.attributes).length > 0)
      || (s.input && Object.keys(s.input).length > 0)
      || (s.output && Object.keys(s.output).length > 0);
    const rowCls = hasDetails ? ' clickable' : '';

    let html = `<div class="span-row" data-span-id="${s.span_id}">
      <div class="span-row-header${rowCls}"${hasDetails ? ' onclick="toggleSpanDetails(this.parentElement)"' : ''}>
        <span class="span-expand-icon">${hasDetails ? '▶' : ''}</span>
        <span class="span-bar-track" style="margin-left: ${depth * 20}px">
          <span class="span-bar span-bar-${type}" style="margin-left: ${offsetPct}%; width: ${widthPct}%;"></span>
          <span class="span-bar-label">${esc(s.name)} <span class="span-dur">${dur}</span></span>
        </span>`;
    if (s.status === 'error') html += '<span class="span-status-err" title="error">!</span>';
    html += '</div>';

    if (hasDetails) {
      html += '<div class="span-details">';
      if (s.attributes && Object.keys(s.attributes).length > 0) {
        html += '<div class="span-detail-section"><div class="span-detail-label">Attributes</div><table>';
        for (const [k, v] of Object.entries(s.attributes))
          html += `<tr><td>${esc(k)}</td><td>${esc(String(v).substring(0, 500))}</td></tr>`;
        html += '</table></div>';
      }
      if (s.input && Object.keys(s.input).length > 0) {
        html += '<div class="span-detail-section"><div class="span-detail-label">Input</div>'
          + '<pre>' + esc(JSON.stringify(s.input, null, 2).substring(0, 5000)) + '</pre></div>';
      }
      if (s.output && Object.keys(s.output).length > 0) {
        html += '<div class="span-detail-section"><div class="span-detail-label">Output</div>'
          + '<pre>' + esc(JSON.stringify(s.output, null, 2).substring(0, 5000)) + '</pre></div>';
      }
      html += '</div>';
    }
    html += '</div>';

    const kids = children[s.span_id] || [];
    kids.forEach(k => { html += renderSpan(k, depth + 1); });
    return html;
  };

  return `<div class="trace-card">
    <div class="trace-card-header">
      <span class="trace-id">${esc(tid.substring(0, 16))}...</span>
      <span>${spans.length} spans</span>
      <span>${fmtMs(totalDur)}</span>
      ${errors > 0 ? `<span style="color:var(--danger)">${errors} errors</span>` : ''}
    </div>
    <div class="trace-spans">${roots.map(r => renderSpan(r, 0)).join('')}</div>
  </div>`;
}

function getSpanType(name) {
  if (name.startsWith('llm.')) return 'llm';
  if (name.startsWith('tool.')) return 'tool';
  if (name.startsWith('orchestrator.')) return 'orch';
  if (name.startsWith('agent.')) return 'agent';
  return 'default';
}

function toggleSpanDetails(row) {
  row.classList.toggle('expanded');
  if (row.classList.contains('expanded')) {
    expandedSpanIds.add(row.dataset.spanId);
  } else {
    expandedSpanIds.delete(row.dataset.spanId);
  }
}

// =========================================================================
// Chat
// =========================================================================
function handleInputKey(event) {
  const input = document.getElementById('message-input');
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    const text = input.value.trim();
    if (text.startsWith('/goal')) {
      const goalText = text.slice(5).trim();
      setGoal(goalText || null);
      input.value = '';
      return;
    }
    sendMessage();
    return;
  }
  if (event.key === 'ArrowUp') {
    if (historyIndex === messageHistory.length) {
      historyDraft = input.value;
    }
    if (historyIndex > 0) {
      historyIndex--;
      input.value = messageHistory[historyIndex];
      // Move cursor to end
      setTimeout(() => { input.selectionStart = input.selectionEnd = input.value.length; }, 0);
    }
    event.preventDefault();
    return;
  }
  if (event.key === 'ArrowDown') {
    if (historyIndex < messageHistory.length) {
      historyIndex++;
      input.value = historyIndex < messageHistory.length
        ? messageHistory[historyIndex]
        : historyDraft;
      setTimeout(() => { input.selectionStart = input.selectionEnd = input.value.length; }, 0);
    }
    event.preventDefault();
    return;
  }
}

function _updateParadigmHint() {
  const hint = document.getElementById('paradigm-hint');
  const parts = [];
  if (activeParadigm) {
    const labels = { plan_solve: '/plan', deep_research: '/research' };
    parts.push(labels[activeParadigm] || '');
  }
  if (reflectEnabled) parts.push('/reflect');
  hint.textContent = parts.length ? parts.join(' ') : 'react';
  hint.style.color = parts.length ? 'var(--accent)' : 'var(--text-muted)';
}

function toggleParadigm(card) {
  const paradigm = card.dataset.paradigm;
  const wasActive = card.classList.contains('active');

  // Deselect all paradigm cards (not reflect)
  document.querySelectorAll('.paradigm-card:not(.reflect-card)').forEach(c => c.classList.remove('active'));
  activeParadigm = null;

  if (!wasActive) {
    card.classList.add('active');
    activeParadigm = paradigm;
  }
  _updateParadigmHint();
}

function toggleReflect(card) {
  reflectEnabled = !reflectEnabled;
  card.classList.toggle('active', reflectEnabled);
  _updateParadigmHint();
}

// -- image attachment --------------------------------------------------

function _addImageFromFile(file) {
  if (!file || !file.type || !file.type.startsWith('image/')) {
    console.log('mybot: _addImageFromFile skipped', file ? file.type : 'null-file');
    return;
  }
  const reader = new FileReader();
  reader.onload = function() {
    attachedImages.push(reader.result);
    _renderImagePreviews();
    console.log('mybot: image added, count=' + attachedImages.length);
  };
  reader.onerror = function() {
    console.error('mybot: FileReader error', reader.error);
  };
  reader.readAsDataURL(file);
}

function _removeImage(idx) {
  attachedImages.splice(idx, 1);
  _renderImagePreviews();
}

function _renderImagePreviews() {
  const container = document.getElementById('image-previews');
  if (!container) {
    console.error('mybot: #image-previews not found');
    return;
  }
  container.innerHTML = '';
  attachedImages.forEach(function(url, i) {
    const div = document.createElement('div');
    div.className = 'image-preview-item';
    const img = document.createElement('img');
    img.src = url;
    div.appendChild(img);
    const btn = document.createElement('button');
    btn.className = 'remove-btn';
    btn.textContent = '×';
    btn.onclick = function() { _removeImage(i); };
    div.appendChild(btn);
    container.appendChild(div);
  });
}

// -- paste handler for clipboard images --

document.addEventListener('paste', function(e) {
  try {
    const cd = e.clipboardData;
    if (!cd || !cd.items) {
      console.log('mybot: paste — no clipboardData.items');
      return;
    }
    for (let i = 0; i < cd.items.length; i++) {
      const item = cd.items[i];
      console.log('mybot: paste item[' + i + '] type=' + item.type + ' kind=' + item.kind);
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        console.log('mybot: paste — image item detected, file=' + (file ? file.name || file.type : 'null'));
        if (file) {
          _addImageFromFile(file);
        } else {
          console.warn('mybot: getAsFile() returned null for image clipboard item');
        }
      }
    }
  } catch (err) {
    console.error('mybot: paste handler error', err);
  }
});

// -- drag-and-drop handler --------------------------------------------------

const _inputArea = document.getElementById('input-area');

_inputArea.addEventListener('dragover', function(e) {
  e.preventDefault();
  _inputArea.classList.add('drop-active');
});

_inputArea.addEventListener('dragleave', function(e) {
  _inputArea.classList.remove('drop-active');
});

_inputArea.addEventListener('drop', function(e) {
  e.preventDefault();
  _inputArea.classList.remove('drop-active');
  const files = e.dataTransfer && e.dataTransfer.files;
  if (!files) return;
  for (let i = 0; i < files.length; i++) {
    _addImageFromFile(files[i]);
  }
});


async function sendMessage() {
  if (activeObsView) switchView('chat');

  const input = document.getElementById('message-input');
  const btn = document.getElementById('send-btn');
  let message = input.value.trim();
  if (!message && !attachedImages.length || isStreaming) return;

  // Prepend paradigm prefixes
  const prefixes = [];
  if (reflectEnabled) prefixes.push('/reflect');
  if (activeParadigm) {
    const cmdMap = { plan_solve: '/plan', deep_research: '/research' };
    prefixes.push(cmdMap[activeParadigm] || '');
  }
  if (prefixes.length) message = prefixes.join(' ') + ' ' + message;

  // Capture images before clearing
  const imagesToSend = attachedImages.length ? attachedImages.slice() : null;

  console.log('mybot: sendMessage textLen=' + message.length + ' images=' + (imagesToSend ? imagesToSend.length : 0));

  messageHistory.push(message);
  historyIndex = messageHistory.length;
  historyDraft = '';
  _saveMessageHistory(currentSession);
  input.value = '';
  attachedImages = [];
  _renderImagePreviews();
  isStreaming = true;
  btn.disabled = true;

  const msgContainer = document.getElementById('messages');
  const userBubble = addBubble('user', message, new Date().toISOString());
  // Show image thumbnails in the user bubble
  if (imagesToSend && imagesToSend.length) {
    const imgsDiv = document.createElement('div');
    imgsDiv.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;';
    imagesToSend.forEach(function(url) {
      const img = document.createElement('img');
      img.src = url;
      img.style.cssText = 'max-width:120px;max-height:80px;border-radius:4px;border:1px solid var(--border);';
      imgsDiv.appendChild(img);
    });
    userBubble.querySelector('.msg-content').appendChild(imgsDiv);
  }

  const asstEl = addBubble('assistant', '', new Date().toISOString());
  const contentEl = asstEl.querySelector('.msg-content');

  let thinkingBlock = null, thinkingBody = null;
  let toolBlock = null, toolBody = null;
  let textBuffer = '';

  try {
    const resp = await fetch('/chat/' + currentSession, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message,
        goal: currentGoal,
        images: imagesToSend || undefined,
      }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      contentEl.innerHTML = '<span class="error-msg">Error: ' + esc(err.error || 'Unknown') + '</span>';
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      const parts = buf.split('\n\n');
      buf = parts.pop();

      for (const part of parts) {
        if (!part.trim()) continue;
        const lines = part.split('\n');
        let event = '', data = '';

        for (const line of lines) {
          if (line.startsWith('event: ')) event = line.slice(7);
          else if (line.startsWith('data: ')) data = line.slice(6);
        }

        try { data = JSON.parse(data); } catch(e) {}

        switch (event) {
          case 'delta':
            textBuffer += data.token || '';
            contentEl.innerHTML = marked.parse(textBuffer);
            scrollDown();
            if (thinkingBlock) { thinkingBlock.classList.remove('open'); thinkingBlock = null; }
            break;

          case 'thinking':
            if (!thinkingBlock) {
              thinkingBlock = createThinkBlock(asstEl);
              thinkingBody = thinkingBlock.querySelector('.think-body');
            }
            thinkingBlock.classList.add('open');
            thinkingBody.textContent += data.token || '';
            scrollDown();
            break;

          case 'thinking_done':
            if (thinkingBlock) {
              setTimeout(() => thinkingBlock && thinkingBlock.classList.remove('open'), 2000);
            }
            break;

          case 'tool_start':
            if (!toolBlock || toolBlock.dataset.name !== data.name) {
              toolBlock = createToolBlock(asstEl, data.name);
              toolBody = toolBlock.querySelector('.tool-body');
            }
            break;

          case 'tool_end':
            if (toolBlock) {
              toolBody.textContent += (data.detail || JSON.stringify(data)) + '\n';
              if (data.status === 'error') {
                toolBlock.querySelector('.tool-summary').style.color = '#f87171';
              }
            }
            break;

          case 'done':
            if (data.usage && (data.usage.prompt_tokens || data.usage.completion_tokens)) {
              const badge = document.createElement('div');
              badge.className = 'usage-badge';
              badge.textContent = 'in:' + (data.usage.prompt_tokens || '?')
                + ' out:' + (data.usage.completion_tokens || '?');
              asstEl.appendChild(badge);
            }
            break;

          case 'error':
            contentEl.innerHTML += '<div class="error-msg">Error: ' + esc(data.message || '') + '</div>';
            break;

          case 'hitl_confirm':
            _onHitlConfirm(data);
            break;
        }
      }
    }
  } catch (err) {
    contentEl.innerHTML += '<div class="error-msg">Connection error: ' + esc(err.message) + '</div>';
  } finally {
    isStreaming = false;
    btn.disabled = false;
    document.getElementById('message-input').focus();
    loadSessions();
    if (activeObsView) refreshObsView();
  }
}

function addBubble(role, text, ts) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message ' + role;
  const timeStr = ts ? formatTime(new Date(ts)) : formatTime(new Date());
  div.innerHTML = '<div class="msg-content">' + (text ? esc(text) : '') + '</div>'
    + '<div class="msg-time">' + esc(timeStr) + '</div>';
  msgs.appendChild(div);
  scrollDown();
  return div;
}

function formatTime(date) {
  const h = date.getHours().toString().padStart(2, '0');
  const m = date.getMinutes().toString().padStart(2, '0');
  return h + ':' + m;
}

function createThinkBlock(parent) {
  const block = document.createElement('div');
  block.className = 'think-block open';
  block.innerHTML = `
    <div class="think-summary" onclick="this.parentElement.classList.toggle('open')">
      <span class="arrow">&#9654;</span> Thinking
    </div>
    <div class="think-body"></div>`;
  parent.appendChild(block);
  return block;
}

function createToolBlock(parent, name) {
  const block = document.createElement('div');
  block.className = 'tool-block open';
  block.dataset.name = name;
  block.innerHTML = `
    <div class="tool-summary" onclick="this.parentElement.classList.toggle('open')">
      <span class="arrow">&#9654;</span> Tool: ${esc(name)}
    </div>
    <div class="tool-body"></div>`;
  parent.appendChild(block);
  return block;
}

function scrollDown() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function fmtNum(n) {
  if (n == null) return '-';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}

function fmtMs(v) {
  if (v == null) return '-';
  if (v >= 1000) return (v / 1000).toFixed(1) + 's';
  return v.toFixed(0) + 'ms';
}

(async function() {
  _loadMessageHistory('default');
  const sessions = await loadSessions();
  const recent = sessions.find(s => s.message_count > 0);
  if (recent) selectSession(recent.key);
  else { _connectPushEvents('default'); loadHistory('default'); }
})();
